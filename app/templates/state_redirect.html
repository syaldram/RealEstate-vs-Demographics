<!DOCTYPE HTML>
<html lang="en">
	<head>
		<title>State Data | Real Estate Demographics</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<meta name="robots" content="noindex" />
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
		<link rel="stylesheet" href="{{ url_for('static', filename='assets/css/main.css') }}" />
		<link rel="stylesheet" href="{{ url_for('static', filename='assets/css/custom.css') }}" />
		<script>
			(function () {
				'use strict';

				var validStates = {{ state_abbreviations.values() | list | tojson }};
				var state = new URLSearchParams(window.location.search).get('state');

				if (state) {
					state = state.toUpperCase();
				}

				if (validStates.indexOf(state) !== -1) {
					window.location.replace('/state/' + state + '/#charts_tag');
				}
			})();
		</script>
	</head>
	<body class="is-preload landing">
		<div id="page-wrapper">
			<header id="header" role="banner">
				<h1 id="logo">
					<a href="{{ url_for('home') }}" aria-label="Home"><img src="{{ url_for('static', filename='images/us_flag2.png') }}" height="34" alt="US Flag"></a>
					<span class="header-title">RE &amp; Demographics</span>
				</h1>
			</header>

			<section id="content" class="wrapper style1">
				<div class="container">
					<header class="major">
						<h2>State Data</h2>
					</header>
					<p class="section-subtitle">Choose a state to continue.</p>
					<div class="state-selector-wrapper">
						<label for="state-select">Choose a state</label>
						<select id="state-select" class="state-select" size="6" aria-label="Select a state">
							{% for k, v in state_abbreviations.items() %}
							<option value="{{ v }}">{{ k }} ({{ v }})</option>
							{% endfor %}
						</select>
					</div>
				</div>
			</section>
		</div>

		<script>
			(function () {
				'use strict';

				var stateSelect = document.getElementById('state-select');
				if (stateSelect) {
					stateSelect.addEventListener('change', function () {
						if (this.value) {
							window.location.href = '/state/' + this.value + '/#charts_tag';
						}
					});
				}
			})();
		</script>
	</body>
</html>
